<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Glow filter -->
    <filter id="neon-glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="neon-glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="cyan-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <linearGradient id="pink-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#b100ff" />
    </linearGradient>
  </defs>

  <!-- Dark Space Background -->
  <rect width="512" height="512" rx="100" fill="#080810" />
  <rect width="500" height="500" x="6" y="6" rx="94" fill="none" stroke="url(#cyan-blue)" stroke-width="4" opacity="0.3" filter="url(#neon-glow-cyan)" />

  <!-- Neon Grid Lines (Futuristic vibe) -->
  <path d="M 0,128 L 512,128 M 0,256 L 512,256 M 0,384 L 512,384 M 128,0 L 128,512 M 256,0 L 256,512 M 384,0 L 384,512" stroke="#1f1f38" stroke-width="2" opacity="0.3" />

  <!-- Cyber Bird Shape -->
  <g transform="translate(30, 20)">
    <!-- Wing Backing Glow -->
    <path d="M 170,260 L 100,200 L 140,180 L 210,210 Z" fill="none" stroke="#ff007f" stroke-width="6" filter="url(#neon-glow-pink)" opacity="0.6"/>

    <!-- Bird Body -->
    <path d="M 180,180 
             C 240,140 320,170 340,220 
             C 360,270 300,320 220,320 
             C 170,320 150,280 140,250 
             C 120,230 110,210 130,190 
             C 150,170 170,185 180,180 Z" 
          fill="#101026" stroke="url(#cyan-blue)" stroke-width="8" filter="url(#neon-glow-cyan)" />

    <!-- Cyber Wing (Front) -->
    <path d="M 210,220 L 120,240 L 160,280 L 240,250 Z" fill="url(#pink-purple)" stroke="#ff007f" stroke-width="4" filter="url(#neon-glow-pink)" />

    <!-- Jet Thruster / Tail Flame (Representing flight boost) -->
    <path d="M 120,240 L 70,245 L 90,260 L 60,270 L 110,280 L 130,260 Z" fill="#ffaa00" opacity="0.8" filter="url(#neon-glow-pink)" />

    <!-- Glowing Cyber Eye -->
    <circle cx="290" cy="210" r="12" fill="#fff" filter="url(#neon-glow-cyan)" />
    <circle cx="290" cy="210" r="6" fill="#00f0ff" />

    <!-- Neon Yellow Beak -->
    <path d="M 340,220 L 390,235 L 330,260 Z" fill="#ffea00" stroke="#ffea00" stroke-width="3" filter="url(#neon-glow-cyan)" />
  </g>
</svg>
